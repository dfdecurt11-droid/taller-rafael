<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>TALLER RAFAEL'S - Panel Administrativo</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fuente -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />

  <!-- PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter',sans-serif;
      background:#f1f5f9;
      color:#0f172a;
    }

    .sidebar{
      width:280px;
      background:#0f172a;
      color:white;
      min-height:100vh;
      position:fixed;
      left:0;
      top:0;
      padding:25px;
      overflow-y:auto;
    }

    .main{
      margin-left:280px;
      padding:30px;
    }

    .card{
      background:white;
      border-radius:24px;
      padding:24px;
      box-shadow:0 4px 20px rgba(0,0,0,0.05);
    }

    .btn{
      border:none;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      transform:translateY(-2px);
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.6);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:1000;
      padding:20px;
    }

    .modal.active{
      display:flex;
    }

    .modal-content{
      width:100%;
      max-width:750px;
      background:white;
      border-radius:25px;
      overflow:hidden;
      animation:show .25s ease;
    }

    @keyframes show{
      from{
        opacity:0;
        transform:scale(.9);
      }
      to{
        opacity:1;
        transform:scale(1);
      }
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th{
      background:#f8fafc;
      color:#64748b;
      font-size:12px;
      text-transform:uppercase;
    }

    th,td{
      padding:16px;
      text-align:center;
    }

    tr{
      border-bottom:1px solid #e2e8f0;
    }

    input,select{
      width:100%;
      padding:14px;
      border-radius:14px;
      border:1px solid #cbd5e1;
      outline:none;
    }

    input:focus,
    select:focus{
      border-color:#2563eb;
      box-shadow:0 0 0 3px rgba(37,99,235,.2);
    }

    .grid{
      display:grid;
      gap:20px;
    }

    @media(max-width:900px){

      .sidebar{
        position:relative;
        width:100%;
        min-height:auto;
      }

      .main{
        margin-left:0;
      }

    }

  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="flex items-center gap-3 mb-10">

      <div
        style="
          width:60px;
          height:60px;
          border-radius:18px;
          background:#2563eb;
          display:flex;
          align-items:center;
          justify-content:center;
          font-size:25px;
        "
      >
        <i class="fa-solid fa-screwdriver-wrench"></i>
      </div>

      <div>
        <h1 style="font-size:22px;font-weight:900;">
          Taller Rafael's
        </h1>

        <p style="color:#94a3b8;font-size:13px;">
          Sistema Administrativo
        </p>
      </div>

    </div>

    <div class="space-y-3">

      <button
        class="btn"
        style="
          width:100%;
          background:#2563eb;
          color:white;
          padding:15px;
          border-radius:16px;
          font-weight:700;
        "
      >
        <i class="fa-solid fa-chart-pie"></i>
        Dashboard
      </button>

    </div>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOP -->
    <section class="card mb-6">

      <div
        style="
          display:flex;
          justify-content:space-between;
          align-items:center;
          flex-wrap:wrap;
          gap:20px;
        "
      >

        <div>

          <h2 style="font-size:32px;font-weight:900;">
            Panel Administrativo
          </h2>

          <p style="color:#64748b;margin-top:8px;">
            Gestión completa de trabajadores
          </p>

        </div>

        <button
          onclick="abrirModalCrear()"
          class="btn"
          style="
            background:#2563eb;
            color:white;
            padding:15px 25px;
            border-radius:16px;
            font-weight:800;
          "
        >
          <i class="fa-solid fa-plus"></i>
          Añadir Trabajador
        </button>

      </div>

    </section>

    <!-- CARDS -->
    <section
      class="grid mb-6"
      style="
        grid-template-columns:
        repeat(auto-fit,minmax(250px,1fr));
      "
    >

      <div class="card">

        <p style="color:#64748b;font-weight:700;">
          Trabajadores
        </p>

        <h2
          id="cantidadTrabajadores"
          style="
            font-size:42px;
            margin-top:10px;
            font-weight:900;
          "
        >
          0
        </h2>

      </div>

      <div class="card">

        <p style="color:#64748b;font-weight:700;">
          Planilla Total
        </p>

        <h2
          id="planillaTotal"
          style="
            font-size:42px;
            margin-top:10px;
            font-weight:900;
            color:#16a34a;
          "
        >
          S/. 0
        </h2>

      </div>

      <div class="card">

        <button
          onclick="generarReporteGeneral()"
          class="btn"
          style="
            width:100%;
            height:100%;
            min-height:120px;
            border-radius:20px;
            background:#059669;
            color:white;
            font-size:18px;
            font-weight:900;
          "
        >
          <i class="fa-solid fa-file-pdf"></i>
          Generar Reporte PDF
        </button>

      </div>

    </section>

    <!-- TABLA -->
    <section class="card">

      <div
        style="
          display:flex;
          justify-content:space-between;
          align-items:center;
          flex-wrap:wrap;
          gap:15px;
          margin-bottom:20px;
        "
      >

        <h3 style="font-size:24px;font-weight:900;">
          Nómina de Trabajadores
        </h3>

        <input
          type="text"
          id="buscador"
          placeholder="Buscar trabajador..."
          oninput="filtrarTrabajadores()"
          style="max-width:300px;"
        />

      </div>

      <div style="overflow-x:auto;">

        <table>

          <thead>

            <tr>

              <th>#</th>
              <th>Trabajador</th>
              <th>DNI</th>
              <th>Teléfono</th>
              <th>Área</th>
              <th>Sueldo</th>
              <th>Acciones</th>

            </tr>

          </thead>

          <tbody id="tablaTrabajadores"></tbody>

        </table>

      </div>

    </section>

  </main>

  <!-- MODAL -->
  <div class="modal" id="modalTrabajador">

    <div class="modal-content">

      <!-- HEADER -->
      <div
        style="
          background:#0f172a;
          color:white;
          padding:25px;
          display:flex;
          justify-content:space-between;
          align-items:center;
        "
      >

        <h2
          id="tituloModal"
          style="font-size:22px;font-weight:900;"
        >
          Nuevo Trabajador
        </h2>

        <button
          onclick="cerrarModal()"
          style="
            background:none;
            border:none;
            color:white;
            font-size:28px;
            cursor:pointer;
          "
        >
          ×
        </button>

      </div>

      <!-- FORM -->
      <form
        id="formTrabajador"
        style="
          padding:25px;
          display:grid;
          grid-template-columns:
          repeat(auto-fit,minmax(250px,1fr));
          gap:20px;
        "
      >

        <input type="hidden" id="trabajadorId" />

        <div>
          <label>Nombres</label>
          <input type="text" id="nombres" required />
        </div>

        <div>
          <label>Apellidos</label>
          <input type="text" id="apellidos" required />
        </div>

        <div>
          <label>DNI</label>
          <input type="text" id="dni" maxlength="8" required />
        </div>

        <div>
          <label>Teléfono</label>
          <input type="text" id="telefono" required />
        </div>

        <div>
          <label>Área</label>

          <select id="area">

            <option value="maquinista">
              Maquinista
            </option>

            <option value="manual">
              Manual
            </option>

            <option value="planchador">
              Planchador
            </option>

          </select>

        </div>

        <div>
          <label>Sueldo Base</label>
          <input type="number" id="sueldo" step="0.01" required />
        </div>

        <div style="grid-column:1/-1;">

          <button
            type="submit"
            class="btn"
            style="
              width:100%;
              background:#2563eb;
              color:white;
              padding:16px;
              border-radius:16px;
              font-weight:900;
              font-size:16px;
            "
          >
            Guardar Trabajador
          </button>

        </div>

      </form>

    </div>

  </div>

  <script>

    // ============================
    // API
    // ============================
    const API_URL =
      "https://taller-rafael-1.onrender.com/api/trabajadores";

    let trabajadores = [];

    // ============================
    // INICIO
    // ============================
    document.addEventListener(
      "DOMContentLoaded",
      cargarTrabajadores
    );

    // ============================
    // CARGAR TRABAJADORES
    // ============================
    async function cargarTrabajadores(){

      try{

        const response =
          await fetch(API_URL);

        trabajadores =
          await response.json();

        renderizarTabla();

      }catch(error){

        console.error(error);

        alert(
          "Error conectando con el servidor"
        );
      }
    }

    // ============================
    // RENDER
    // ============================
    function renderizarTabla(){

      const tbody =
        document.getElementById(
          "tablaTrabajadores"
        );

      tbody.innerHTML = "";

      let total = 0;

      trabajadores.forEach((t,index)=>{

        total += parseFloat(t.sueldo_base);

        tbody.innerHTML += `
          <tr>

            <td>${index + 1}</td>

            <td style="font-weight:700;">
              ${t.apellidos}, ${t.nombres}
            </td>

            <td>${t.dni}</td>

            <td>${t.telefono}</td>

            <td style="text-transform:capitalize;">
              ${t.area_trabajo}
            </td>

            <td style="font-weight:800;color:#16a34a;">
              S/. ${parseFloat(
                t.sueldo_base
              ).toFixed(2)}
            </td>

            <td>

              <div
                style="
                  display:flex;
                  justify-content:center;
                  gap:10px;
                "
              >

                <button
                  onclick="editarTrabajador(${index})"
                  class="btn"
                  style="
                    width:45px;
                    height:45px;
                    border-radius:14px;
                    background:#facc15;
                    color:white;
                  "
                >
                  <i class="fa-solid fa-pen"></i>
                </button>

                <button
                  onclick="eliminarTrabajador(${t.id})"
                  class="btn"
                  style="
                    width:45px;
                    height:45px;
                    border-radius:14px;
                    background:#ef4444;
                    color:white;
                  "
                >
                  <i class="fa-solid fa-trash"></i>
                </button>

                <button
                  onclick="generarPDF(${index})"
                  class="btn"
                  style="
                    width:45px;
                    height:45px;
                    border-radius:14px;
                    background:#2563eb;
                    color:white;
                  "
                >
                  <i class="fa-solid fa-file-pdf"></i>
                </button>

              </div>

            </td>

          </tr>
        `;
      });

      document.getElementById(
        "cantidadTrabajadores"
      ).innerText =
        trabajadores.length;

      document.getElementById(
        "planillaTotal"
      ).innerText =
        "S/. " + total.toFixed(2);

    }

    // ============================
    // FILTRAR
    // ============================
    function filtrarTrabajadores(){

      const texto =
        document.getElementById(
          "buscador"
        ).value.toLowerCase();

      const filtrados =
        trabajadores.filter(t=>{

          const nombre =
            `${t.nombres} ${t.apellidos}`
            .toLowerCase();

          return (
            nombre.includes(texto)
            ||
            t.dni.includes(texto)
          );

        });

      const backup = trabajadores;

      trabajadores = filtrados;

      renderizarTabla();

      trabajadores = backup;

    }

    // ============================
    // MODAL
    // ============================
    function abrirModalCrear(){

      document.getElementById(
        "formTrabajador"
      ).reset();

      document.getElementById(
        "trabajadorId"
      ).value = "";

      document.getElementById(
        "tituloModal"
      ).innerText =
        "Nuevo Trabajador";

      document.getElementById(
        "modalTrabajador"
      ).classList.add("active");

    }

    function cerrarModal(){

      document.getElementById(
        "modalTrabajador"
      ).classList.remove("active");

    }

    // ============================
    // EDITAR
    // ============================
    function editarTrabajador(index){

      const t = trabajadores[index];

      document.getElementById(
        "trabajadorId"
      ).value = t.id;

      document.getElementById(
        "nombres"
      ).value = t.nombres;

      document.getElementById(
        "apellidos"
      ).value = t.apellidos;

      document.getElementById(
        "dni"
      ).value = t.dni;

      document.getElementById(
        "telefono"
      ).value = t.telefono;

      document.getElementById(
        "area"
      ).value = t.area_trabajo;

      document.getElementById(
        "sueldo"
      ).value = t.sueldo_base;

      document.getElementById(
        "tituloModal"
      ).innerText =
        "Editar Trabajador";

      document.getElementById(
        "modalTrabajador"
      ).classList.add("active");

    }

    // ============================
    // GUARDAR
    // ============================
    document
      .getElementById("formTrabajador")
      .addEventListener(
        "submit",
        async function(e){

          e.preventDefault();

          const id =
            document.getElementById(
              "trabajadorId"
            ).value;

          const datos = {

            nombres:
              document.getElementById(
                "nombres"
              ).value,

            apellidos:
              document.getElementById(
                "apellidos"
              ).value,

            dni:
              document.getElementById(
                "dni"
              ).value,

            telefono:
              document.getElementById(
                "telefono"
              ).value,

            area_trabajo:
              document.getElementById(
                "area"
              ).value,

            sueldo_base:
              document.getElementById(
                "sueldo"
              ).value

          };

          try{

            const response =
              await fetch(
                id
                  ? `${API_URL}/${id}`
                  : API_URL,
                {
                  method:
                    id ? "PUT" : "POST",

                  headers:{
                    "Content-Type":
                    "application/json"
                  },

                  body:
                    JSON.stringify(datos)
                }
              );

            if(response.ok){

              cerrarModal();

              cargarTrabajadores();

            }else{

              alert(
                "Error guardando trabajador"
              );
            }

          }catch(error){

            console.error(error);

          }

        }
      );

    // ============================
    // ELIMINAR
    // ============================
    async function eliminarTrabajador(id){

      const confirmar =
        confirm(
          "¿Deseas eliminar este trabajador?"
        );

      if(!confirmar) return;

      try{

        const response =
          await fetch(
            `${API_URL}/${id}`,
            {
              method:"DELETE"
            }
          );

        if(response.ok){

          cargarTrabajadores();

        }else{

          alert(
            "No se pudo eliminar"
          );
        }

      }catch(error){

        console.error(error);

      }

    }

    // ============================
    // PDF INDIVIDUAL
    // ============================
    function generarPDF(index){

      const t = trabajadores[index];

      const div =
        document.createElement("div");

      div.innerHTML = `
        <div
          style="
            padding:40px;
            font-family:Arial;
          "
        >

          <h1>
            Taller Rafael's
          </h1>

          <hr>

          <h2>
            Boleta de Trabajador
          </h2>

          <p>
            <strong>Nombre:</strong>
            ${t.nombres} ${t.apellidos}
          </p>

          <p>
            <strong>DNI:</strong>
            ${t.dni}
          </p>

          <p>
            <strong>Área:</strong>
            ${t.area_trabajo}
          </p>

          <p>
            <strong>Teléfono:</strong>
            ${t.telefono}
          </p>

          <p>
            <strong>Sueldo:</strong>
            S/. ${t.sueldo_base}
          </p>

        </div>
      `;

      html2pdf()
        .from(div)
        .set({
          margin:0.5,
          filename:`${t.dni}.pdf`,
          html2canvas:{
            scale:2
          },
          jsPDF:{
            unit:"in",
            format:"letter",
            orientation:"portrait"
          }
        })
        .save();

    }

    // ============================
    // PDF GENERAL
    // ============================
    function generarReporteGeneral(){

      let html = `
        <div
          style="
            padding:30px;
            font-family:Arial;
          "
        >

          <h1>
            Taller Rafael's
          </h1>

          <hr>

          <h2>
            Reporte General
          </h2>

          <table
            border="1"
            cellpadding="10"
            cellspacing="0"
            width="100%"
            style="
              margin-top:20px;
              border-collapse:collapse;
            "
          >

            <tr>
              <th>#</th>
              <th>Trabajador</th>
              <th>Área</th>
              <th>Sueldo</th>
            </tr>
      `;

      trabajadores.forEach((t,index)=>{

        html += `
          <tr>

            <td>
              ${index + 1}
            </td>

            <td>
              ${t.nombres}
              ${t.apellidos}
            </td>

            <td>
              ${t.area_trabajo}
            </td>

            <td>
              S/. ${t.sueldo_base}
            </td>

          </tr>
        `;
      });

      html += `
          </table>
        </div>
      `;

      const div =
        document.createElement("div");

      div.innerHTML = html;

      html2pdf()
        .from(div)
        .set({
          margin:0.5,
          filename:"Reporte_General.pdf",
          html2canvas:{
            scale:2
          },
          jsPDF:{
            unit:"in",
            format:"letter",
            orientation:"portrait"
          }
        })
        .save();

    }

  </script>

</body>
</html>

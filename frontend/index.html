<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller Rafael's - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 min-h-screen flex items-center justify-center p-4 font-sans text-slate-800 antialiased">

    <div id="toast" class="fixed top-5 right-5 bg-emerald-600 text-white px-6 py-3.5 rounded-xl shadow-2xl flex items-center space-x-3 transform translate-y-[-150%] transition-transform duration-500 ease-out z-50 border border-emerald-500/30">
        <i id="toast-icon" class="fas fa-check-circle text-xl animate-pulse"></i>
        <span id="toast-message" class="font-semibold text-sm">¡Cambios realizados correctamente!</span>
    </div>

    <div class="w-full max-w-md glass-card rounded-2xl shadow-2xl p-6 sm:p-8 border border-white/40 transition-all duration-300">
        
        <div class="text-center mb-6">
            <h1 class="text-2xl font-black tracking-tight text-slate-950">TALLER RAFAEL'S</h1>
            <p class="text-xs text-slate-400 uppercase tracking-widest mt-0.5 font-bold">Sistema de Asistencia</p>
        </div>

        <div id="view-login" class="space-y-5">
            <div class="flex flex-col items-center space-y-2 border-b pb-4">
                <img id="login-avatar-display" src="" alt="Admin Perfil" class="w-24 h-24 rounded-full object-cover border-4 border-blue-600/20 shadow-md transition-transform duration-300 hover:scale-105">
                <h2 class="text-md font-bold text-slate-700">Panel de Acceso</h2>
            </div>

            <form id="form-login" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1.5">Correo Electrónico</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email" id="login-email" required class="w-full pl-10 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm" placeholder="sandra@admin.com">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1.5">Contraseña</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" id="login-password" required class="w-full pl-10 pr-10 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm" placeholder="••••••••">
                        <button type="button" onclick="togglePassword('login-password', 'icon-login-pass')" class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 hover:text-slate-600">
                            <i id="icon-login-pass" class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-600/20 transition-all transform active:scale-[0.97] text-sm tracking-wide">
                    Ingresar al Sistema <i class="fas fa-sign-in-alt ml-1"></i>
                </button>
            </form>

            <div class="text-center pt-2">
                <button type="button" onclick="showView('view-pin')" class="text-xs sm:text-sm text-blue-600 hover:text-blue-800 font-semibold transition-colors underline decoration-blue-200 underline-offset-4">
                    ¿Olvidaste tu contraseña? Configuración
                </button>
            </div>
        </div>

        <div id="view-pin" class="hidden space-y-5">
            <div class="text-center border-b pb-3">
                <h2 class="text-lg font-bold text-slate-800">Verificación de Seguridad</h2>
                <p class="text-xs text-slate-400 mt-1">Ingrese el PIN de seguridad para gestionar la cuenta</p>
            </div>
            
            <form id="form-pin" class="space-y-4">
                <div>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                            <i class="fas fa-key"></i>
                        </span>
                        <input type="password" id="pin-input" maxlength="6" required class="w-full text-center tracking-[0.5em] text-xl font-black pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="••••••">
                    </div>
                    <p id="pin-error-msg" class="text-xs text-rose-600 font-semibold text-center mt-2 hidden"></p>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button type="button" onclick="cancelarPin()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-2.5 rounded-xl transition-all text-sm">
                        Cancelar
                    </button>
                    <button type="submit" id="btn-validate-pin" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-2.5 rounded-xl transition-all shadow-lg shadow-amber-500/20 text-sm disabled:opacity-50 disabled:cursor-not-allowed">
                        Validar PIN
                    </button>
                </div>
            </form>
        </div>

        <div id="view-settings" class="hidden space-y-4">
            <div class="border-b pb-2">
                <h2 class="text-lg font-bold text-slate-800"><i class="fas fa-cog mr-1 text-blue-600"></i> Ajustes de Administrador</h2>
                <p class="text-[11px] text-slate-400 mt-0.5">Modifica solo los valores que deseas actualizar</p>
            </div>
            
            <div class="flex flex-col items-center space-y-2 bg-slate-50/80 p-3 rounded-xl border border-slate-100">
                <img id="settings-avatar-preview" src="" alt="Avatar" class="w-20 h-20 rounded-full object-cover border-4 border-blue-500 shadow-md">
                <label class="cursor-pointer bg-slate-200 hover:bg-slate-300 text-slate-700 text-xs font-bold px-3 py-1.5 rounded-lg border border-slate-300/60 transition-all flex items-center space-x-1.5">
                    <i class="fas fa-image"></i>
                    <span>Elegir Imagen</span>
                    <input type="file" id="input-foto-file" accept="image/*" class="hidden" onchange="procesarFotoLocal(this)">
                </label>
            </div>

            <form id="form-settings" class="space-y-3.5">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">Nuevo Correo Electrónico</label>
                    <input type="email" id="settings-email" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all" placeholder="Dejar vacío para no modificar">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">Nueva Contraseña</label>
                    <div class="relative">
                        <input type="password" id="settings-password" class="w-full pl-3 pr-10 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all" placeholder="Mínimo 6 caracteres">
                        <button type="button" onclick="togglePassword('settings-password', 'icon-set-pass')" class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 hover:text-slate-600">
                            <i id="icon-set-pass" class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">Confirmar Contraseña</label>
                    <div class="relative">
                        <input type="password" id="settings-confirm-password" class="w-full pl-3 pr-10 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all" placeholder="Repita la nueva contraseña">
                        <button type="button" onclick="togglePassword('settings-confirm-password', 'icon-set-confirm')" class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 hover:text-slate-600">
                            <i id="icon-set-confirm" class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 pt-2">
                    <button type="button" onclick="cancelSettings()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-2.5 rounded-xl text-sm transition-all">
                        Cancelar
                    </button>
                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-xl text-sm transition-all shadow-lg shadow-emerald-600/20">
                        Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        const SECURITY_PIN = '202611';
        
        let fotoBinariaBase64 = "";
        let intentosRestantes = 3;

        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('adminEmail')) {
                localStorage.setItem('adminEmail', 'sandra@admin.com');
            }
            actualizarAvataresDeInterfaz();
        });

        function actualizarAvataresDeInterfaz() {
            const fotoActual = localStorage.getItem('adminFoto') || 'https://via.placeholder.com/150';
            document.getElementById('login-avatar-display').src = fotoActual;
            document.getElementById('settings-avatar-preview').src = fotoActual;
        }

        function showView(viewId) {
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-pin').classList.add('hidden');
            document.getElementById('view-settings').classList.add('hidden');
            document.getElementById(viewId).classList.remove('hidden');
        }

        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }

        function showToast(message, isSuccess = true) {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            document.getElementById('toast-message').innerText = message;
            if(isSuccess) {
                toast.className = "fixed top-5 right-5 bg-emerald-600 text-white px-6 py-3.5 rounded-xl shadow-2xl flex items-center space-x-3 transform transition-transform duration-500 ease-out z-50 border border-emerald-500/30";
                icon.className = "fas fa-check-circle text-xl animate-pulse";
            } else {
                toast.className = "fixed top-5 right-5 bg-rose-600 text-white px-6 py-3.5 rounded-xl shadow-2xl flex items-center space-x-3 transform transition-transform duration-500 ease-out z-50 border border-rose-500/30";
                icon.className = "fas fa-exclamation-circle text-xl animate-bounce";
            }
            toast.classList.remove('translate-y-[-150%]');
            setTimeout(() => { toast.classList.add('translate-y-[-150%]'); }, 4000);
        }

        function procesarFotoLocal(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    fotoBinariaBase64 = e.target.result;
                    document.getElementById('settings-avatar-preview').src = fotoBinariaBase64;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const contrasena = document.getElementById('login-password').value;

            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, contrasena })
                });
                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('adminEmail', data.user.email);
                    if (data.user.foto_perfil) localStorage.setItem('adminFoto', data.user.foto_perfil);
                    
                    showToast('¡Bienvenido al Sistema!', true);
                    
                    // AQUI ESTÁ EL CAMBIO: Redirige a dashboard.html
                    setTimeout(() => {
                        window.location.href = 'dashboard.html'; 
                    }, 2000);
                } else {
                    showToast('Credenciales incorrectas.', false);
                }
            } catch (error) {
                showToast('Error de conexión con el servidor.', false);
            }
        });

        document.getElementById('form-pin').addEventListener('submit', (e) => {
            e.preventDefault();
            const pinVal = document.getElementById('pin-input').value;
            if (pinVal === SECURITY_PIN) {
                showView('view-settings');
            } else {
                showToast('PIN incorrecto.', false);
            }
        });

        function cancelarPin() { showView('view-login'); }

        function cancelSettings() { showView('view-login'); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TALLER RAFAEL'S | Login Profesional</title>
    <style>
        /* CSS GLOBAL Y DE DISEÑO PROFESIONAL */
        :root {
            --primary-color: #3b82f6; 
            --bg-color: #111827; 
            --form-bg: #1f2937; 
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #374151;
            --error-color: #ef4444;
            --success-color: #10b981;
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        #welcome-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(17, 24, 39, 0.95);
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999; text-align: center;
        }
        .welcome-box h2 { color: var(--success-color); font-size: 2rem; margin-bottom: 1rem; }
        .welcome-box p { color: var(--text-color); font-size: 1.2rem; }

        #main-container { width: 100%; max-width: 400px; }
        .section { display: none; background-color: var(--form-bg); padding: 2.5rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid var(--border-color); }
        .section.active { display: block; }

        h1, h2 { text-align: center; margin-bottom: 1.5rem; color: var(--text-color); }
        .profile-pic-container { display: flex; justify-content: center; margin-bottom: 1.5rem; position: relative; }
        .profile-pic { width: 96px; height: 96px; border-radius: 50%; object-fit: cover; border: 4px solid var(--primary-color); box-shadow: 0 4px 10px rgba(0,0,0,0.2); background-color: #ccc; }
        
        .form-group { margin-bottom: 1rem; position: relative; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }
        .form-control { width: 100%; padding: 0.75rem 1rem; border-radius: 0.5rem; border: 1px solid var(--border-color); background-color: transparent; color: var(--text-color); font-size: 1rem; transition: border-color 0.2s; }
        
        .toggle-password { position: absolute; right: 1rem; top: 2.3rem; cursor: pointer; background: none; border: none; color: var(--text-muted); font-size: 1.2rem; }
        .toggle-password:hover { color: var(--text-color); }
        
        .btn-primary { width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: none; background-color: var(--primary-color); color: white; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background-color 0.2s; }
        .btn-primary:hover { background-color: #2563eb; }
        .btn-secondary { background-color: #4b5563; }
        .btn-secondary:hover { background-color: #374151; }

        .form-footer { margin-top: 1.5rem; text-align: center; }
        .form-footer a { color: var(--primary-color); text-decoration: none; font-size: 0.9rem; }
        .error-message { color: var(--error-color); font-size: 0.9rem; text-align: center; margin-top: -0.5rem; margin-bottom: 1rem; display: none; }
        
        #pin-view.active { display: flex !important; justify-content: center; align-items: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); z-index: 1000; }
        #pin-content { background-color: var(--form-bg); padding: 2.5rem; border-radius: 1rem; width: 90%; max-width: 350px; text-align: center; }
        #pin-blocker { display: none; color: var(--error-color); margin-top: 1rem; }
        .custom-file-input { display: none; }
        .file-upload-label { display: block; margin-top: 0.5rem; text-align: center; cursor: pointer; color: var(--primary-color); font-size: 0.9rem; }
        .config-actions { margin-top: 1.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

        @media (max-width: 480px) {
            .section { padding: 1.5rem; }
            .profile-pic { width: 72px; height: 72px; }
            .config-actions { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="welcome-overlay">
    <div class="welcome-box">
        <h2>¡Bienvenido, al TALLER RAFAEL'S!</h2>
        <p>Iniciando sesión en el sistema...</p>
    </div>
</div>

<div id="main-container">
    <!-- Login View -->
    <div id="login-view" class="section active">
        <div class="profile-pic-container">
            <img src="image.png" alt="Perfil" id="login-profile-pic" class="profile-pic" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
            <div style="display:none; width:96px; height:96px; border-radius:50%; background-color:#374151; color:white; justify-content:center; align-items:center; font-size:2rem;">👤</div>
        </div>
        <h1>Iniciar Sesión</h1>
        <p class="error-message" id="login-error">Usuario o contraseña incorrectos.</p>
        <form id="login-form">
            <div class="form-group">
                <label for="login-email">Correo Electrónico</label>
                <input type="email" id="login-email" class="form-control" placeholder="sandra@admin.com" required>
            </div>
            <div class="form-group">
                <label for="login-password">Contraseña</label>
                <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
                <button type="button" class="toggle-password" data-target="login-password">👁️</button>
            </div>
            <button type="submit" class="btn-primary">Entrar</button>
        </form>
        <div class="form-footer">
            <a href="#" id="goto-pin">Configuración ⚙️</a>
        </div>
    </div>

    <!-- Pin View -->
    <div id="pin-view" class="section">
        <div id="pin-content">
            <h2>Acceso a Configuración</h2>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Por favor, ingresa tu PIN de seguridad.</p>
            <p class="error-message" id="pin-error"></p>
            <form id="pin-form">
                <div class="form-group">
                    <input type="password" id="security-pin" class="form-control" style="text-align: center; letter-spacing: 0.5em; font-size: 1.5rem;" maxlength="6" pattern="[0-9]*" inputmode="numeric" required>
                </div>
                <button type="submit" class="btn-primary" id="pin-submit-btn">Ingresar PIN</button>
            </form>
            <div id="pin-blocker">Has superado los intentos. Espera <span id="countdown">15</span> seg.</div>
            <div class="form-footer"><a href="#" id="pin-back-to-login" style="color:var(--text-muted)">Cancelar</a></div>
        </div>
    </div>

    <!-- Config View -->
    <div id="config-view" class="section">
        <h2>Panel de Configuración</h2>
        <form id="config-form">
            <div class="profile-pic-container">
                <img src="image.png" alt="Nuevo Perfil" id="config-profile-pic-preview" class="profile-pic" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                <div style="display:none; width:96px; height:96px; border-radius:50%; background-color:#374151; color:white; justify-content:center; align-items:center; font-size:2rem;">👤</div>
                <input type="file" id="config-photo-input" class="custom-file-input" accept="image/*">
                <label for="config-photo-input" class="file-upload-label">Cambiar foto 📷</label>
            </div>
            <div class="form-group">
                <label for="config-username">Nombre de Usuario</label>
                <input type="text" id="config-username" class="form-control" value="sandra@admin.com">
            </div>
            <div class="form-group">
                <label for="config-password">Nueva Contraseña</label>
                <input type="password" id="config-password" class="form-control">
                <button type="button" class="toggle-password" data-target="config-password">👁️</button>
            </div>
            <div class="error-message" id="config-error"></div>
            <div class="config-actions">
                <button type="submit" class="btn-primary">Guardar</button>
                <button type="button" id="config-exit" class="btn-primary btn-secondary">Salir</button>
            </div>
        </form>
    </div>
</div>

<script>
    const CORRECT_USER = 'sandra@admin.com';
    const CORRECT_PASS = 'Matyleoliam';
    const CORRECT_PIN = '202611';
    const MAX_PIN_ATTEMPTS = 3;
    const LOCKOUT_SECONDS = 15;
    let pinAttempts = 0;

    const views = { login: document.getElementById('login-view'), pin: document.getElementById('pin-view'), config: document.getElementById('config-view') };
    const loginProfilePic = document.getElementById('login-profile-pic');

    document.addEventListener('DOMContentLoaded', () => {
        const savedPhoto = localStorage.getItem('profilePicture');
        if (savedPhoto) {
            loginProfilePic.src = savedPhoto;
            document.getElementById('config-profile-pic-preview').src = savedPhoto;
        }
    });

    function showView(viewId) {
        Object.values(views).forEach(v => v.classList.remove('active'));
        views[viewId].classList.add('active');
    }

    document.querySelectorAll('.toggle-password').forEach(btn => {
        btn.addEventListener('click', () => {
            const input = document.getElementById(btn.getAttribute('data-target'));
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);
            btn.textContent = type === 'password' ? '👁️' : '🙈';
        });
    });

    document.getElementById('login-form').addEventListener('submit', (e) => {
        e.preventDefault();
        if (document.getElementById('login-email').value === CORRECT_USER && document.getElementById('login-password').value === CORRECT_PASS) {
            document.getElementById('welcome-overlay').style.display = 'flex';
            setTimeout(() => window.location.href = 'dashboard.html', 2000);
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    });

    document.getElementById('goto-pin').addEventListener('click', (e) => { e.preventDefault(); showView('pin'); });
    document.getElementById('pin-back-to-login').addEventListener('click', (e) => { e.preventDefault(); showView('login'); });

    document.getElementById('pin-form').addEventListener('submit', (e) => {
        e.preventDefault();
        if (document.getElementById('security-pin').value === CORRECT_PIN) {
            showView('config');
        } else {
            pinAttempts++;
            if (pinAttempts >= MAX_PIN_ATTEMPTS) {
                document.getElementById('pin-submit-btn').style.display = 'none';
                document.getElementById('pin-blocker').style.display = 'block';
                setTimeout(() => {
                    pinAttempts = 0;
                    document.getElementById('pin-submit-btn').style.display = 'block';
                    document.getElementById('pin-blocker').style.display = 'none';
                }, LOCKOUT_SECONDS * 1000);
            }
        }
    });

    document.getElementById('config-photo-input').addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => document.getElementById('config-profile-pic-preview').src = ev.target.result;
        reader.readAsDataURL(e.target.files[0]);
    });

    document.getElementById('config-form').addEventListener('submit', (e) => {
        e.preventDefault();
        localStorage.setItem('profilePicture', document.getElementById('config-profile-pic-preview').src);
        alert('Cambios guardados');
        showView('login');
    });

    document.getElementById('config-exit').addEventListener('click', () => showView('login'));
</script>
</body>
</html>

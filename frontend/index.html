<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TALLER RAFAEL'S | Sistema de Acceso</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --primary:#2563eb;
    --primary-hover:#1d4ed8;
    --secondary:#374151;

    --success:#10b981;
    --danger:#ef4444;

    --bg:#0f172a;
    --card:#111827;
    --input:#1f2937;
    --border:#334155;

    --text:#f8fafc;
    --muted:#94a3b8;

    --radius:18px;
    --transition:.3s ease;
    --shadow:0 20px 45px rgba(0,0,0,.35);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:
        radial-gradient(circle at top left,#1e3a8a 0%,transparent 30%),
        radial-gradient(circle at bottom right,#0f766e 0%,transparent 25%),
        var(--bg);

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:var(--text);
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;
}

.card{
    background:rgba(17,24,39,.88);
    backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:var(--radius);
    padding:35px;
    box-shadow:var(--shadow);
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo img{
    width:90px;
    height:90px;
    object-fit:cover;
    border-radius:50%;
    border:4px solid var(--primary);
    box-shadow:0 10px 25px rgba(37,99,235,.4);
}

.logo h1{
    margin-top:15px;
    font-size:1.5rem;
}

.logo p{
    color:var(--muted);
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    color:var(--muted);
}

.input-wrapper{
    position:relative;
}

.form-control{
    width:100%;
    padding:14px 16px;
    border-radius:14px;
    border:1px solid var(--border);
    background:var(--input);
    color:var(--text);
    font-size:1rem;
}

.form-control:focus{
    outline:none;
    border-color:var(--primary);
}

.toggle-password{
    position:absolute;
    top:50%;
    right:15px;
    transform:translateY(-50%);
    background:none;
    border:none;
    cursor:pointer;
    color:var(--muted);
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    font-weight:600;
    cursor:pointer;
    transition:var(--transition);
}

.btn-primary{
    background:linear-gradient(135deg,var(--primary),#3b82f6);
    color:#fff;
}

.btn-primary:hover{
    transform:translateY(-2px);
}

.btn-secondary{
    background:var(--secondary);
    color:#fff;
}

.hidden{
    display:none;
}

.alert{
    padding:12px;
    border-radius:12px;
    margin-bottom:18px;
    text-align:center;
    display:none;
}

.alert-error{
    background:rgba(239,68,68,.12);
    border:1px solid rgba(239,68,68,.25);
    color:#fca5a5;
}

.footer{
    text-align:center;
    margin-top:20px;
}

.footer a{
    color:var(--primary);
    text-decoration:none;
}

.toast{
    position:fixed;
    top:20px;
    right:20px;
    background:var(--success);
    color:#fff;
    padding:15px 22px;
    border-radius:14px;
    box-shadow:var(--shadow);
    opacity:0;
    transform:translateY(-20px);
    transition:var(--transition);
}

.toast.show{
    opacity:1;
    transform:translateY(0);
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(15,23,42,.92);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    opacity:0;
    pointer-events:none;
    transition:var(--transition);
}

.overlay.active{
    opacity:1;
    pointer-events:auto;
}

.loader{
    width:70px;
    height:70px;
    border:5px solid rgba(255,255,255,.1);
    border-top:5px solid var(--primary);
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin-bottom:20px;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

</style>
</head>

<body>

<div class="toast" id="toast">
    ✅ Configuración guardada correctamente
</div>

<div class="overlay" id="overlay">
    <div class="loader"></div>
    <h2>Bienvenido</h2>
    <p>Ingresando al sistema...</p>
</div>

<div class="container">

    <!-- LOGIN -->
    <div class="card" id="loginView">

        <div class="logo">
            <img src="image.png" id="profileImage">
            <h1>TALLER RAFAEL'S</h1>
            <p>Sistema profesional de acceso</p>
        </div>

        <div class="alert alert-error" id="loginError">
            Usuario o contraseña incorrectos
        </div>

        <form id="loginForm">

            <div class="form-group">
                <label>Correo electrónico</label>
                <input type="email" id="email" class="form-control" required>
            </div>

            <div class="form-group">
                <label>Contraseña</label>

                <div class="input-wrapper">
                    <input type="password" id="password" class="form-control" required>

                    <button type="button" class="toggle-password" data-target="password">
                        👁️
                    </button>
                </div>
            </div>

            <button class="btn btn-primary">
                Iniciar Sesión
            </button>
        </form>

        <div class="footer">
            <a href="#" id="openConfig">
                Configuración ⚙️
            </a>
        </div>

    </div>

    <!-- CONFIG -->
    <div class="card hidden" id="configView">

        <div class="logo">
            <img src="image.png" id="configPreview">
            <h1>Configuración</h1>
            <p>Personaliza tu acceso</p>
        </div>

        <div class="alert alert-error" id="pinError">
            PIN incorrecto
        </div>

        <form id="configForm">

            <div class="form-group">
                <label>PIN de seguridad</label>
                <input type="password" id="pin" class="form-control">
            </div>

            <div class="form-group">
                <label>Nuevo usuario</label>
                <input type="text" id="newUser" class="form-control">
            </div>

            <div class="form-group">
                <label>Nueva contraseña</label>

                <div class="input-wrapper">
                    <input type="password" id="newPass" class="form-control">

                    <button type="button" class="toggle-password" data-target="newPass">
                        👁️
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label>Foto de perfil</label>
                <input type="file" id="photoInput" accept="image/*" class="form-control">
            </div>

            <button class="btn btn-primary">
                Guardar
            </button>

            <br><br>

            <button type="button" class="btn btn-secondary" id="closeConfig">
                Volver
            </button>

        </form>
    </div>
</div>

<script>

const authSystem = {
    user: localStorage.getItem("user") || "sandra@admin.com",
    pass: localStorage.getItem("pass") || "Matyleoliam",
    pin: "202611"
};

const $ = (id) => document.getElementById(id);

const ui = {
    loginForm: $("loginForm"),
    configForm: $("configForm"),
    loginView: $("loginView"),
    configView: $("configView"),
    overlay: $("overlay"),
    toast: $("toast"),
    loginError: $("loginError"),
    pinError: $("pinError"),
    profileImage: $("profileImage"),
    configPreview: $("configPreview")
};

window.addEventListener("DOMContentLoaded", () => {

    $("newUser").value = authSystem.user;

    const photo = localStorage.getItem("photo");

    if(photo){
        ui.profileImage.src = photo;
        ui.configPreview.src = photo;
    }
});

document.querySelectorAll(".toggle-password").forEach(btn => {

    btn.addEventListener("click", () => {

        const input = $(btn.dataset.target);

        if(input.type === "password"){
            input.type = "text";
            btn.textContent = "🙈";
        }else{
            input.type = "password";
            btn.textContent = "👁️";
        }
    });
});

ui.loginForm.addEventListener("submit", (e) => {

    e.preventDefault();

    const email = $("email").value;
    const password = $("password").value;

    if(email === authSystem.user && password === authSystem.pass){

        ui.loginError.style.display = "none";

        ui.overlay.classList.add("active");

        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 2000);

    }else{
        ui.loginError.style.display = "block";
    }
});

$("openConfig").onclick = (e) => {

    e.preventDefault();

    ui.loginView.classList.add("hidden");
    ui.configView.classList.remove("hidden");
};

$("closeConfig").onclick = () => {

    ui.configView.classList.add("hidden");
    ui.loginView.classList.remove("hidden");
};

$("photoInput").addEventListener("change", (e) => {

    const file = e.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = (ev) => {

        ui.profileImage.src = ev.target.result;
        ui.configPreview.src = ev.target.result;
    };

    reader.readAsDataURL(file);
});

ui.configForm.addEventListener("submit", (e) => {

    e.preventDefault();

    if($("pin").value !== authSystem.pin){

        ui.pinError.style.display = "block";
        return;
    }

    ui.pinError.style.display = "none";

    authSystem.user = $("newUser").value;

    if($("newPass").value.trim()){
        authSystem.pass = $("newPass").value;
    }

    localStorage.setItem("user", authSystem.user);
    localStorage.setItem("pass", authSystem.pass);
    localStorage.setItem("photo", ui.configPreview.src);

    ui.toast.classList.add("show");

    setTimeout(() => {
        ui.toast.classList.remove("show");

        ui.configView.classList.add("hidden");
        ui.loginView.classList.remove("hidden");

    }, 2000);
});

</script>

</body>
</html>
